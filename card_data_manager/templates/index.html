<style>
    table, tr, td {
        border: 1px solid black;
        border-collapse: collapse;
    }
</style>

<h1>Control Center</h1>
<a href="/collect_new_cards">collect new cards</a>
<table>
    <tbody>
        <tr>
            <td>
                <b>ID</b>
            </td>
            <td>
                <b>Name</b>
            </td>
            <td>
                <b>Type</b>
            </td>
        </tr>
        {% for c in cards %}
        <tr>
            <td>
                {{c.card_id}}
            </td>
            <td>
                {{c.name}}
            </td>
            <td>
                {{c.card_type}}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
